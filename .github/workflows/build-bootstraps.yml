# upload this file with your repository to GitHub
# to recompile your custom bootstrap within GitHub Actions.
name: Build Termux bootstraps

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      - name: Build bootstraps
        run: |
          scripts/free-space.sh
          scripts/run-docker.sh sudo ln -sf "/data/data/com.logicodeum.ide/aosp" /system
          scripts/run-docker.sh scripts/build-bootstraps.sh  --add xkeyboard-config --disable-bootstrap-second-stage --architectures aarch64
      - name: Upload artifacts
        uses: actions/upload-artifact@v4.6.0
        with:
          name: Termux bootstraps
          path: |
            ./*.zip
